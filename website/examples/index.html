<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Examples | ErikrafT</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <header class="header"><div class="container"><nav class="header-nav"><div class="header-left"><a href="../index.html" class="logo">ErikrafT Language (.erik)</a><a href="../docs/index.html" class="nav-link">Docs</a></div></nav></div></header>
    <main class="container section">
        <h1 style="margin-bottom: var(--space-8);">ErikrafT Examples</h1>
        <div class="grid">
            <div class="card">
                <h3 class="card-title">Hello World</h3>
                <div class="editor-container"><div class="editor-content" style="min-height: auto;"><div class="code-content">pub fn main() {<br>  print("Hello World")<br>}</div></div></div>
            </div>
            <div class="card">
                <h3 class="card-title">AI Chat</h3>
                <div class="editor-container"><div class="editor-content" style="min-height: auto;"><div class="code-content">use ai<br>fn ask() async {<br>  await ai.chat("Hi")<br>}</div></div></div>
            </div>
            <div class="card">
                <h3 class="card-title">Web Component</h3>
                <div class="editor-container"><div class="editor-content" style="min-height: auto;"><div class="code-content">component App {<br>  render { &lt;div&gt;App&lt;/div&gt; }<br>}</div></div></div>
            </div>
        </div>
    </main>
</body>
</html>
