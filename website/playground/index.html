<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground | ErikrafT</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header class="header"><div class="container"><nav class="header-nav"><div class="header-left"><a href="../index.html" class="logo"><div class="logo-icon"></div> ErikrafT</a><a href="../docs/index.html" class="nav-link">Docs</a><a href="index.html" class="nav-link active">Playground</a></div><div class="header-right"><div class="btn btn-primary">Share</div></div></nav></div></header>

    <main style="height: calc(100vh - 64px); display: flex; flex-direction: column;">
        <div class="playground-grid" style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden;">
            <div class="editor-container" style="margin: 0; border: none; border-right: 1px solid var(--border); border-radius: 0;">
                <div class="editor-header">
                    <div class="editor-tabs"><div class="editor-tab active">playground.erik</div></div>
                    <div class="btn btn-ghost" style="color: var(--primary);">Run</div>
                </div>
                <div class="editor-content" style="height: 100%;">
                    <textarea spellcheck="false" style="width: 100%; height: 100%; background: transparent; border: none; color: #e2e8f0; font-family: var(--font-mono); font-size: 0.875rem; resize: none; outline: none; line-height: 1.6;">
pub fn main() {
    let message = "Welcome to the ErikrafT Playground!"
    print(message)

    // Try some AI primitives
    // let answer = await ai.chat("What can I do here?")
    // print(answer)
}
                    </textarea>
                </div>
            </div>
            <div style="background: var(--bg); display: flex; flex-direction: column;">
                <div class="editor-header" style="background: rgba(255,255,255,0.01);">
                    <div class="editor-tabs"><div class="editor-tab active">Console</div></div>
                    <div class="btn btn-ghost">Clear</div>
                </div>
                <div style="padding: var(--space-4); font-family: var(--font-mono); font-size: 0.875rem; color: var(--text-muted);">
                    <div style="color: var(--accent);">$ erik run playground.erik</div>
                    <div style="color: #fff;">Welcome to the ErikrafT Playground!</div>
                    <div style="color: var(--text-muted); opacity: 0.5; margin-top: var(--space-4);">Program exited with code 0</div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
